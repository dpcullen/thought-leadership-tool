<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Thought Leadership Tool{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}" class="logo">TL Engine</a>
        <div class="nav-links">
            <a href="{{ url_for('linkedin') }}" {% if request.endpoint == 'linkedin' %}class="active"{% endif %}>LinkedIn Posts</a>
            <a href="{{ url_for('digest') }}" {% if request.endpoint == 'digest' %}class="active"{% endif %}>Weekly Digest</a>
            <a href="{{ url_for('drafts') }}" {% if request.endpoint == 'drafts' %}class="active"{% endif %}>Saved Drafts</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div class="status-bar">
        <div class="status-dot"></div>
        <span class="status-text">Checking connection...</span>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
